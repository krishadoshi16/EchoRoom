version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: echoroom
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./echoroom.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=mysql://root:root@db:3306/echoroom
      - SECRET_KEY=django-insecure-production-key-change-me
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://frontend:80
      - DEBUG=False
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build: .
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db_data:
